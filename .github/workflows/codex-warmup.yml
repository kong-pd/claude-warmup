name: codex-warmup

on:
  workflow_dispatch:

jobs:
  warmup:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Warm up Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: "Say hi briefly and do nothing else."
          sandbox: read-only
